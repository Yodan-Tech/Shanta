name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Dummy values so Prisma + Next build can evaluate env without real secrets.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?pgbouncer=true"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-dummy-service-role-key"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
