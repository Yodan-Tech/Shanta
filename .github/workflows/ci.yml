name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Dummy values so Prisma + Next build can evaluate env without real secrets.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?pgbouncer=true"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-dummy-service-role-key"
      CRON_SECRET: "ci-dummy-cron-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start app + run structural smoke tests
        run: |
          pnpm start &
          APP_PID=$!
          # Wait for Next.js server (landing page — no real DB needed)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ -o /dev/null && break || sleep 2
          done
          # Run only tests that don't need a live DB; chromium only (mobile
          # viewport tests require longer timeouts and run locally/staging).
          # Files must come before flags in Playwright v1.61 CLI.
          PLAYWRIGHT_BASE_URL=http://localhost:3000 pnpm exec playwright test \
            e2e/cron-security.spec.ts \
            e2e/confirm.spec.ts \
            e2e/rate-limit.spec.ts \
            --project=chromium
          kill $APP_PID || true
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          CRON_SECRET: "ci-dummy-cron-secret"

  # Integration tests require a real Supabase test project and secrets configured
  # in a GitHub Actions "integration" environment. Enable once test DB is provisioned:
  # Settings → Environments → integration → add TEST_DATABASE_URL, TEST_DIRECT_URL,
  # NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
  #
